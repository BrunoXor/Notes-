<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In • AppName</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #0f172a;
            --text2: #64748b;
            --border: #e2e8f0;
            --accent: #0ea5e9;
            --accent2: #06b6d4;
            --success: #10b981;
            --error: #ef4444;
            --radius: 14px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text);
            -webkit-font-smoothing: antialiased;
        }

        /* Background */
        .bg-shapes { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
        .bg-shape {
            position: absolute; border-radius: 50%; opacity: 0.07;
            animation: drift 25s infinite ease-in-out;
        }
        .bg-shape:nth-child(1) { width: 500px; height: 500px; background: #0ea5e9; top: -150px; right: -100px; }
        .bg-shape:nth-child(2) { width: 350px; height: 350px; background: #06b6d4; bottom: -100px; left: -80px; animation-delay: -8s; }
        .bg-shape:nth-child(3) { width: 200px; height: 200px; background: #8b5cf6; top: 50%; left: 50%; animation-delay: -16s; }
        @keyframes drift {
            0%,100% { transform: translate(0,0) rotate(0deg); }
            33% { transform: translate(30px,-30px) rotate(120deg); }
            66% { transform: translate(-20px,20px) rotate(240deg); }
        }

        /* Card */
        .auth-container {
            position: relative; z-index: 1;
            width: 100%; max-width: 440px;
        }
        .auth-card {
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.6);
            border-radius: 24px;
            padding: 2.5rem 2rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02), 0 20px 50px rgba(0,0,0,0.06);
            position: relative;
            overflow: hidden;
        }
        .auth-card::after {
            content: '';
            position: absolute; top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, #0ea5e9, #06b6d4, #8b5cf6);
        }

        /* Header */
        .auth-header { text-align: center; margin-bottom: 1.75rem; }
        .auth-header .brand {
            display: inline-flex; align-items: center; gap: 0.5rem;
            margin-bottom: 1rem;
        }
        .brand-logo {
            width: 40px; height: 40px;
            background: linear-gradient(135deg, #0ea5e9, #06b6d4);
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 1.1rem; font-weight: 700;
        }
        .brand-name { font-size: 1.3rem; font-weight: 700; letter-spacing: -0.02em; }
        .auth-header h2 { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.02em; }
        .auth-header p { font-size: 0.85rem; color: var(--text2); margin-top: 0.25rem; }

        /* Tabs */
        .tabs { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; }
        .tab {
            flex: 1; padding: 0.6rem; border: none; background: #f1f5f9;
            border-radius: 10px; font-size: 0.85rem; font-weight: 600;
            cursor: pointer; color: var(--text2); transition: all 0.2s;
        }
        .tab.active { background: #0ea5e9; color: white; }

        /* Panels */
        .panel { display: none; }
        .panel.active { display: block; }

        /* Form */
        .field { margin-bottom: 1rem; }
        .field label { display: block; font-size: 0.8rem; font-weight: 600; color: var(--text); margin-bottom: 0.35rem; }
        .field input {
            width: 100%; padding: 0.75rem 0.9rem;
            background: #f8fafc; border: 1.5px solid var(--border);
            border-radius: 10px; font-size: 0.9rem; color: var(--text);
            transition: all 0.2s; font-family: inherit;
        }
        .field input:focus {
            outline: none; border-color: #0ea5e9;
            box-shadow: 0 0 0 3px rgba(14,165,233,0.1); background: white;
        }
        .field input::placeholder { color: #94a3b8; }

        /* OTP */
        .otp-row { display: flex; gap: 0.5rem; justify-content: center; margin: 1.25rem 0; }
        .otp-cell {
            width: 46px !important; height: 52px; text-align: center;
            font-size: 1.3rem !important; font-weight: 600 !important;
            padding: 0 !important; border-radius: 10px !important;
        }

        /* Buttons */
        .btn {
            width: 100%; padding: 0.75rem 1.5rem; border: none;
            border-radius: 10px; font-size: 0.9rem; font-weight: 600;
            cursor: pointer; transition: all 0.2s; font-family: inherit;
            margin-top: 0.5rem;
        }
        .btn-primary {
            background: linear-gradient(135deg, #0ea5e9, #06b6d4);
            color: white; box-shadow: 0 4px 15px rgba(14,165,233,0.3);
        }
        .btn-primary:hover:not(:disabled) {
            transform: translateY(-1px); box-shadow: 0 8px 25px rgba(14,165,233,0.4);
        }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .btn-outline { background: white; color: #0ea5e9; border: 1.5px solid #0ea5e9; }
        .btn-outline:hover { background: #f0f9ff; }
        .btn-success { background: #10b981; color: white; }
        .btn-success:hover:not(:disabled) { background: #059669; }

        /* Alerts */
        .alert {
            padding: 0.7rem 0.9rem; border-radius: 10px; font-size: 0.8rem;
            margin-bottom: 1rem; display: none; font-weight: 500;
        }
        .alert.show { display: block; }
        .alert-error { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }
        .alert-success { background: #ecfdf5; color: #059669; border: 1px solid #a7f3d0; }

        /* Divider */
        .divider { display: flex; align-items: center; gap: 0.75rem; margin: 1rem 0; color: #94a3b8; font-size: 0.75rem; }
        .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: #e2e8f0; }

        /* Strength */
        .strength { height: 3px; border-radius: 2px; margin-top: 0.35rem; transition: all 0.3s; background: #e2e8f0; }
        .strength.weak { background: #ef4444; width: 33%; }
        .strength.medium { background: #f59e0b; width: 66%; }
        .strength.strong { background: #10b981; width: 100%; }

        .hidden { display: none !important; }
        .footer-text { text-align: center; margin-top: 1rem; font-size: 0.8rem; color: var(--text2); }
        .footer-text span { color: #0ea5e9; cursor: pointer; font-weight: 600; }

        /* Loading spinner */
        .spinner {
            display: inline-block; width: 18px; height: 18px;
            border: 2.5px solid rgba(255,255,255,0.3);
            border-top-color: white; border-radius: 50%;
            animation: spin 0.6s linear infinite;
            vertical-align: middle; margin-right: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 480px) {
            .auth-card { padding: 1.5rem 1.25rem; border-radius: 20px; }
            .otp-cell { width: 40px !important; height: 48px; font-size: 1.2rem !important; }
        }
    </style>
</head>
<body>

    <!-- Background -->
    <div class="bg-shapes">
        <div class="bg-shape"></div>
        <div class="bg-shape"></div>
        <div class="bg-shape"></div>
    </div>

    <!-- Auth Card -->
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="brand">
                    <div class="brand-logo">◆</div>
                    <span class="brand-name">AppName</span>
                </div>
                <h2 id="pageTitle">Welcome back</h2>
                <p id="pageSub">Sign in to your account</p>
            </div>

            <!-- Tabs -->
            <div class="tabs">
                <button class="tab active" data-tab="login">Sign In</button>
                <button class="tab" data-tab="signup">Create Account</button>
            </div>

            <!-- Alerts -->
            <div class="alert alert-error" id="alertError"></div>
            <div class="alert alert-success" id="alertSuccess"></div>

            <!-- ═══ LOGIN ═══ -->
            <div class="panel active" id="panelLogin">
                <!-- Password Login -->
                <form id="loginPwForm">
                    <div class="field">
                        <label>Email</label>
                        <input type="email" id="loginEmail" placeholder="you@example.com" required>
                    </div>
                    <div class="field">
                        <label>Password</label>
                        <input type="password" id="loginPassword" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn btn-primary" id="loginPwBtn">Sign In</button>
                </form>

                <div class="divider">or</div>

                <!-- OTP Login -->
                <div id="otpRequest">
                    <form id="otpForm">
                        <div class="field">
                            <label>Email for code</label>
                            <input type="email" id="otpEmail" placeholder="you@example.com" required>
                        </div>
                        <button type="submit" class="btn btn-outline" id="sendOtpBtn">Send Code</button>
                    </form>
                </div>

                <!-- OTP Verify -->
                <div id="otpVerify" class="hidden">
                    <p style="text-align:center;font-size:0.85rem;color:var(--text2);margin-bottom:0.5rem;">
                        Code sent to <strong id="otpEmailDisplay" style="color:var(--text);"></strong>
                    </p>
                    <div class="otp-row" id="loginOtpRow">
                        <input type="text" class="otp-cell" maxlength="1" pattern="[0-9]" inputmode="numeric">
                        <input type="text" class="otp-cell" maxlength="1" pattern="[0-9]" inputmode="numeric">
                        <input type="text" class="otp-cell" maxlength="1" pattern="[0-9]" inputmode="numeric">
                        <input type="text" class="otp-cell" maxlength="1" pattern="[0-9]" inputmode="numeric">
                        <input type="text" class="otp-cell" maxlength="1" pattern="[0-9]" inputmode="numeric">
                        <input type="text" class="otp-cell" maxlength="1" pattern="[0-9]" inputmode="numeric">
                    </div>
                    <button class="btn btn-primary" id="verifyLoginOtpBtn">Verify & Sign In</button>
                    <button class="btn btn-outline" id="backOtpBtn">Back</button>
                </div>

                <p class="footer-text">No account? <span id="goSignup">Create one</span></p>
            </div>

            <!-- ═══ SIGNUP ═══ -->
            <div class="panel" id="panelSignup">
                <!-- Signup Form -->
                <div id="signupRequest">
                    <form id="signupForm">
                        <div class="field">
                            <label>Name</label>
                            <input type="text" id="signupName" placeholder="Your name" required>
                        </div>
                        <div class="field">
                            <label>Email</label>
                            <input type="email" id="signupEmail" placeholder="you@example.com" required>
                        </div>
                        <button type="submit" class="btn btn-primary" id="signupBtn">Send Code</button>
                    </form>
                </div>

                <!-- Signup OTP Verify -->
                <div id="signupVerify" class="hidden">
                    <p style="text-align:center;font-size:0.85rem;color:var(--text2);margin-bottom:0.5rem;">
                        Code sent to <strong id="signupOtpEmail" style="color:var(--text);"></strong>
                    </p>
                    <div class="otp-row" id="signupOtpRow">
                        <input type="text" class="otp-cell" maxlength="1" pattern="[0-9]" inputmode="numeric">
                        <input type="text" class="otp-cell" maxlength="1" pattern="[0-9]" inputmode="numeric">
                        <input type="text" class="otp-cell" maxlength="1" pattern="[0-9]" inputmode="numeric">
                        <input type="text" class="otp-cell" maxlength="1" pattern="[0-9]" inputmode="numeric">
                        <input type="text" class="otp-cell" maxlength="1" pattern="[0-9]" inputmode="numeric">
                        <input type="text" class="otp-cell" maxlength="1" pattern="[0-9]" inputmode="numeric">
                    </div>
                    <button class="btn btn-primary" id="verifySignupOtpBtn">Verify & Create</button>
                    <button class="btn btn-outline" id="backSignupBtn">Back</button>
                </div>

                <!-- Set Password (after OTP verify) -->
                <div id="setPassword" class="hidden">
                    <p style="text-align:center;font-size:0.9rem;color:#059669;margin-bottom:1rem;font-weight:600;">
                        ✓ Verified! Set your password
                    </p>
                    <div class="field">
                        <label>Password</label>
                        <input type="password" id="newPassword" placeholder="Min. 6 characters" required>
                        <div class="strength" id="strengthBar"></div>
                    </div>
                    <div class="field">
                        <label>Confirm</label>
                        <input type="password" id="confirmPassword" placeholder="Re-enter" required>
                    </div>
                    <button class="btn btn-success" id="setPwBtn">Save & Continue</button>
                </div>

                <p class="footer-text">Have account? <span id="goLogin">Sign in</span></p>
            </div>
        </div>
    </div>

    <script>
        // ═══════════════════════════════════════
        // CONFIGURATION - Replace these!
        // ═══════════════════════════════════════
        const SUPABASE_URL = 'https://zpdtzhuygfljrzmdujdv.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpwZHR6aHV5Z2ZsanJ6bWR1amR2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4NzIyNzgsImV4cCI6MjA5NzQ0ODI3OH0.RIKRjajscerC3yoyYE7b-5JZV1hChJ9Hh-EmC-BMRYw';
        const DASHBOARD_URL = './dashboard.html'; // Redirect after login

        // ═══════════════════════════════════════
        const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const $err = document.getElementById('alertError');
        const $ok = document.getElementById('alertSuccess');

        function alert(type, msg) {
            $err.classList.remove('show');
            $ok.classList.remove('show');
            (type === 'error' ? $err : $ok).textContent = msg;
            (type === 'error' ? $err : $ok).classList.add('show');
        }

        function clearAlerts() { $err.classList.remove('show');
            $ok.classList.remove('show'); }

        function load(btn, state) {
            if (state) {
                btn.disabled = true;
                btn.dataset.txt = btn.textContent;
                btn.innerHTML = '<span class="spinner"></span> Loading...';
            } else {
                btn.disabled = false;
                btn.textContent = btn.dataset.txt || btn.textContent;
            }
        }

        function redirectToDashboard() {
            window.location.href = DASHBOARD_URL;
        }

        // Check if already logged in
        async function checkSession() {
            const { data: { session } } = await sb.auth.getSession();
            if (session) redirectToDashboard();
        }
        checkSession();

        // Tabs
        function tab(name) {
            clearAlerts();
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            if (name === 'login') {
                document.querySelector('[data-tab="login"]').classList.add('active');
                document.getElementById('panelLogin').classList.add('active');
                document.getElementById('pageTitle').textContent = 'Welcome back';
                document.getElementById('pageSub').textContent = 'Sign in to your account';
            } else {
                document.querySelector('[data-tab="signup"]').classList.add('active');
                document.getElementById('panelSignup').classList.add('active');
                document.getElementById('pageTitle').textContent = 'Create account';
                document.getElementById('pageSub').textContent = 'Join us today';
                resetSignup();
            }
        }
        document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => tab(t.dataset.tab)));
        document.getElementById('goSignup').addEventListener('click', () => tab('signup'));
        document.getElementById('goLogin').addEventListener('click', () => tab('login'));

        // OTP Helpers
        function setupOtp(id) {
            const ins = document.querySelectorAll(`#${id} input`);
            ins.forEach((inp, i) => {
                inp.addEventListener('input', e => { if (e.target.value && i < 5) ins[i + 1].focus(); });
                inp.addEventListener('keydown', e => { if (e.key === 'Backspace' && !e.target.value && i >
                        0) ins[i - 1].focus(); });
                inp.addEventListener('paste', e => {
                    e.preventDefault();
                    const p = e.clipboardData.getData('text').replace(/\D/g, '').slice(0, 6);
                    p.split('').forEach((c, j) => { if (ins[j]) ins[j].value = c; });
                    if (ins[Math.min(p.length, 5)]) ins[Math.min(p.length, 5)].focus();
                });
            });
        }

        function getOtp(id) { return Array.from(document.querySelectorAll(`#${id} input`)).map(i => i.value).join(''); }

        function clearOtp(id) { document.querySelectorAll(`#${id} input`).forEach(i => i.value = ''); }
        setupOtp('loginOtpRow');
        setupOtp('signupOtpRow');

        // ── LOGIN PASSWORD ──
        document.getElementById('loginPwForm').addEventListener('submit', async e => {
            e.preventDefault();
            clearAlerts();
            const email = document.getElementById('loginEmail').value.trim();
            const pw = document.getElementById('loginPassword').value;
            if (!email || !pw) return alert('error', 'Fill all fields.');
            const btn = document.getElementById('loginPwBtn');
            load(btn, true);
            const { data, error } = await sb.auth.signInWithPassword({ email, password: pw });
            load(btn, false);
            if (error) alert('error', error.message);
            else if (data.user) redirectToDashboard();
        });

        // ── LOGIN OTP ──
        let otpEmail = '';
        document.getElementById('otpForm').addEventListener('submit', async e => {
            e.preventDefault();
            clearAlerts();
            otpEmail = document.getElementById('otpEmail').value.trim();
            if (!otpEmail) return alert('error', 'Enter email.');
            const btn = document.getElementById('sendOtpBtn');
            load(btn, true);
            const { error } = await sb.auth.signInWithOtp({ email: otpEmail, options: { shouldCreateUser: false } });
            load(btn, false);
            if (error) alert('error', error.message);
            else {
                alert('success', 'Code sent.');
                document.getElementById('otpRequest').classList.add('hidden');
                document.getElementById('otpVerify').classList.remove('hidden');
                document.getElementById('otpEmailDisplay').textContent = otpEmail;
                document.querySelector('#loginOtpRow input').focus();
            }
        });
        document.getElementById('verifyLoginOtpBtn').addEventListener('click', async () => {
            clearAlerts();
            const otp = getOtp('loginOtpRow');
            if (otp.length !== 6) return alert('error', 'Enter 6 digits.');
            const btn = document.getElementById('verifyLoginOtpBtn');
            load(btn, true);
            const { data, error } = await sb.auth.verifyOtp({ email: otpEmail, token: otp, type: 'email' });
            load(btn, false);
            if (error) alert('error', error.message);
            else if (data.user) redirectToDashboard();
        });
        document.getElementById('backOtpBtn').addEventListener('click', () => {
            document.getElementById('otpRequest').classList.remove('hidden');
            document.getElementById('otpVerify').classList.add('hidden');
            clearOtp('loginOtpRow');
        });

        // ── SIGNUP ──
        let signupEmail = '',
            signupName = '';

        function resetSignup() {
            document.getElementById('signupRequest').classList.remove('hidden');
            document.getElementById('signupVerify').classList.add('hidden');
            document.getElementById('setPassword').classList.add('hidden');
            clearOtp('signupOtpRow');
        }
        document.getElementById('signupForm').addEventListener('submit', async e => {
            e.preventDefault();
            clearAlerts();
            signupName = document.getElementById('signupName').value.trim();
            signupEmail = document.getElementById('signupEmail').value.trim();
            if (!signupName || !signupEmail) return alert('error', 'Fill all fields.');
            const btn = document.getElementById('signupBtn');
            load(btn, true);
            const { error } = await sb.auth.signInWithOtp({
                email: signupEmail,
                options: { shouldCreateUser: true, data: { full_name: signupName } }
            });
            load(btn, false);
            if (error) alert('error', error.message);
            else {
                alert('success', 'Code sent.');
                document.getElementById('signupRequest').classList.add('hidden');
                document.getElementById('signupVerify').classList.remove('hidden');
                document.getElementById('signupOtpEmail').textContent = signupEmail;
                document.querySelector('#signupOtpRow input').focus();
            }
        });
        document.getElementById('verifySignupOtpBtn').addEventListener('click', async () => {
            clearAlerts();
            const otp = getOtp('signupOtpRow');
            if (otp.length !== 6) return alert('error', 'Enter 6 digits.');
            const btn = document.getElementById('verifySignupOtpBtn');
            load(btn, true);
            const { data, error } = await sb.auth.verifyOtp({ email: signupEmail, token: otp, type: 'email' });
            load(btn, false);
            if (error) alert('error', error.message);
            else {
                alert('success', 'Verified! Set password.');
                document.getElementById('signupVerify').classList.add('hidden');
                document.getElementById('setPassword').classList.remove('hidden');
            }
        });
        document.getElementById('backSignupBtn').addEventListener('click', resetSignup);

        // ── SET PASSWORD ──
        const strengthBar = document.getElementById('strengthBar');
        document.getElementById('newPassword').addEventListener('input', function() {
            const v = this.value;
            strengthBar.className = 'strength';
            if (v.length >= 8 && /[A-Z]/.test(v) && /\d/.test(v)) strengthBar.classList.add('strong');
            else if (v.length >= 6) strengthBar.classList.add('medium');
            else if (v.length > 0) strengthBar.classList.add('weak');
        });
        document.getElementById('setPwBtn').addEventListener('click', async () => {
            clearAlerts();
            const pw = document.getElementById('newPassword').value;
            const cp = document.getElementById('confirmPassword').value;
            if (!pw || pw.length < 6) return alert('error', 'Min 6 characters.');
            if (pw !== cp) return alert('error', 'Passwords don\'t match.');
            const btn = document.getElementById('setPwBtn');
            load(btn, true);
            const { error } = await sb.auth.updateUser({ password: pw });
            load(btn, false);
            if (error) alert('error', error.message);
            else redirectToDashboard();
        });

        console.log('✅ Auth page ready.');
    </script>
</body>
</html>
